# SilentBook 轻量模式（SQLite 单文件，无需 PostgreSQL / Redis）
# 适用：个人本地使用，一条命令启动，数据存本地卷
# 用法：docker compose -f docker-compose.lite.yml up -d
#
# ⚠️ 安全提示：下方密钥为开发默认值，仅适合 localhost 单用户个人使用。
#    如需对外暴露或多用户，请先运行 install.sh 生成强密钥并配置 .env。

services:
  backend:
    image: dada561/silentbook-backend:latest
    build: ./backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/silentbook.db
      - APP_ENV=${APP_ENV:-development}
      - AGENT_API_URL=http://agent:5000
      - PARSER_API_URL=http://notification-parser:6000
      # Redis 在本模式不可用，限流器自动 fail-open（不影响功能）
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - WEBHOOK_USER_ID=${WEBHOOK_USER_ID:-1}
      - JWT_SECRET=${JWT_SECRET:-silentbook-lite-dev-jwt-secret-change-me}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-silentbook-lite-dev-webhook-secret-change-me}
      # 备份加密密钥留空则定时备份不可用（不影响记账主流程）；可用 install.sh 生成
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
    volumes:
      - silentbook_data:/data
    # SQLite 单文件：单 worker 避免写锁竞争（个人单用户场景足够）
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: dada561/silentbook-frontend:latest
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # 浏览器同源调用 /api/*，由 Nuxt server 代理转发到 backend（无需 nginx/跨域）
      - NUXT_PUBLIC_API_BASE=/api
      - NUXT_SSR_API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  agent:
    image: dada561/silentbook-agent:latest
    build: ./agent
    restart: always
    environment:
      - MODEL_NAME=${MODEL_NAME:-aliyun/glm-5.2}
      # AI 分析需要 LLM Key；留空则 AI 功能不可用，记账主流程不受影响
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - SILENTBOOK_MODE=${SILENTBOOK_MODE:-local}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  notification-parser:
    image: dada561/silentbook-parser:latest
    build: ./notification-parser
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  silentbook_data:
