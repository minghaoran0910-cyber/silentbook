services:
  frontend:
    image: dada561/silentbook-frontend:latest
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=/api
      - NUXT_SSR_API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  backend:
    image: dada561/silentbook-backend:latest
    build: ./backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://silentbook:silentbook@db:5432/silentbook
      - AGENT_API_URL=http://agent:5000
      - PARSER_API_URL=http://notification-parser:6000
      - APP_ENV=${APP_ENV:-development}
      - JWT_SECRET=${JWT_SECRET:-silentbook-local-development-only}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-silentbook-local-webhook-only}
      - WEBHOOK_USER_ID=${WEBHOOK_USER_ID:-1}
      - REDIS_URL=redis://redis:6379/0
      - BACKUP_DIR=/var/lib/silentbook/backups
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:?BACKUP_ENCRYPTION_KEY must be set}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - backup_data:/var/lib/silentbook/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-parser:
    image: dada561/silentbook-parser:latest
    build: ./notification-parser
    restart: always
    ports:
      - "6000:6000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  agent:
    image: dada561/silentbook-agent:latest
    build: ./agent
    restart: always
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MODEL_NAME=${MODEL_NAME:-qwen3.7-plus}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - SILENTBOOK_MODE=${SILENTBOOK_MODE:-auto}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=silentbook
      - POSTGRES_PASSWORD=silentbook
      - POSTGRES_DB=silentbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silentbook"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  backup_data:
