
# 本地模式：数据库 + Agent
# 用于混合部署，配合服务器模式使用

services:
  notification-parser:
    build: ./notification-parser
    ports:
      - "6000:6000"

  agent:
    build: ./agent
    ports:
      - "5000:5000"
    environment:
      - MODEL_NAME=${MODEL_NAME:-aliyun/glm-5.2}

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-silentbook}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-silentbook}
      - POSTGRES_DB=${DB_NAME:-silentbook}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
