# 服务器模式：前端 + 后端
# 用于混合部署，数据库和 Agent 在本地

services:
  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: /api
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=/api
      - NUXT_SSR_API_BASE=http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AGENT_API_URL=${AGENT_API_URL}
      - PARSER_API_URL=${PARSER_API_URL:-http://notification-parser:6000}
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET must be set}
      - WEBHOOK_USER_ID=${WEBHOOK_USER_ID:?WEBHOOK_USER_ID must be set}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
