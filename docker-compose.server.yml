# 服务器模式：前端 + 后端
# 用于混合部署，数据库和 Agent 在本地

services:
  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: /api
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=/api
      - NUXT_SSR_API_BASE=http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AGENT_API_URL=${AGENT_API_URL}
      - PARSER_API_URL=${PARSER_API_URL:-http://notification-parser:6000}
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET must be set}
      - WEBHOOK_USER_ID=${WEBHOOK_USER_ID:?WEBHOOK_USER_ID must be set}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BACKUP_DIR=/var/lib/silentbook/backups
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:?BACKUP_ENCRYPTION_KEY must be set}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - backup_data:/var/lib/silentbook/backups
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  backup_data:
